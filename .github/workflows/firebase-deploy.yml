name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_hosting:
        description: Deploy Firebase Hosting (frontend)
        type: boolean
        default: true
      deploy_functions:
        description: Deploy Cloud Functions
        type: boolean
        default: true
      deploy_firestore_rules:
        description: Deploy Firestore security rules
        type: boolean
        default: true
      deploy_firestore_indexes:
        description: Deploy Firestore indexes
        type: boolean
        default: true
      deploy_storage:
        description: Deploy Storage security rules
        type: boolean
        default: true

permissions:
  checks: write
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: firebase-deploy-live
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      hosting: ${{ steps.targets.outputs.hosting }}
      functions: ${{ steps.targets.outputs.functions }}
      firestore_rules: ${{ steps.targets.outputs.firestore_rules }}
      firestore_indexes: ${{ steps.targets.outputs.firestore_indexes }}
      storage: ${{ steps.targets.outputs.storage }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            hosting:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/generate-app-icons.mjs'
              - 'eslint.config.js'
            functions:
              - 'functions/**'
            firestore_rules:
              - 'firestore.rules'
            firestore_indexes:
              - 'firestore.indexes.json'
            storage:
              - 'storage.rules'
            firebase_json:
              - 'firebase.json'

      - name: Resolve deploy targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "hosting=${{ github.event.inputs.deploy_hosting }}" >> "$GITHUB_OUTPUT"
            echo "functions=${{ github.event.inputs.deploy_functions }}" >> "$GITHUB_OUTPUT"
            echo "firestore_rules=${{ github.event.inputs.deploy_firestore_rules }}" >> "$GITHUB_OUTPUT"
            echo "firestore_indexes=${{ github.event.inputs.deploy_firestore_indexes }}" >> "$GITHUB_OUTPUT"
            echo "storage=${{ github.event.inputs.deploy_storage }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hosting=false
          functions=false
          firestore_rules=false
          firestore_indexes=false
          storage=false

          if [ "${{ steps.filter.outputs.hosting }}" = "true" ] || [ "${{ steps.filter.outputs.firebase_json }}" = "true" ]; then
            hosting=true
          fi
          if [ "${{ steps.filter.outputs.functions }}" = "true" ] || [ "${{ steps.filter.outputs.firebase_json }}" = "true" ]; then
            functions=true
          fi
          if [ "${{ steps.filter.outputs.firestore_rules }}" = "true" ]; then
            firestore_rules=true
          fi
          if [ "${{ steps.filter.outputs.firestore_indexes }}" = "true" ]; then
            firestore_indexes=true
          fi
          if [ "${{ steps.filter.outputs.storage }}" = "true" ] || [ "${{ steps.filter.outputs.firebase_json }}" = "true" ]; then
            storage=true
          fi

          echo "hosting=$hosting" >> "$GITHUB_OUTPUT"
          echo "functions=$functions" >> "$GITHUB_OUTPUT"
          echo "firestore_rules=$firestore_rules" >> "$GITHUB_OUTPUT"
          echo "firestore_indexes=$firestore_indexes" >> "$GITHUB_OUTPUT"
          echo "storage=$storage" >> "$GITHUB_OUTPUT"

  deploy_hosting:
    needs: changes
    if: needs.changes.outputs.hosting == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
        env:
          VITE_WEATHERAPI_KEY: ${{ secrets.VITE_WEATHERAPI_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YESGATC }}
          channelId: live
          projectId: yesgatc

  deploy_functions:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YESGATC }}
      - run: npm ci --prefix functions
      - run: npm install -g firebase-tools@14
      - run: firebase deploy --only functions --project yesgatc --non-interactive

  deploy_firestore_rules:
    needs: changes
    if: needs.changes.outputs.firestore_rules == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YESGATC }}
      - run: npm install -g firebase-tools@14
      - run: firebase deploy --only firestore:rules --project yesgatc --non-interactive

  deploy_firestore_indexes:
    needs: changes
    if: needs.changes.outputs.firestore_indexes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YESGATC }}
      - run: npm install -g firebase-tools@14
      - run: firebase deploy --only firestore:indexes --project yesgatc --non-interactive

  deploy_storage:
    needs: changes
    if: needs.changes.outputs.storage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YESGATC }}
      - run: npm install -g firebase-tools@14
      - run: firebase deploy --only storage --project yesgatc --non-interactive
